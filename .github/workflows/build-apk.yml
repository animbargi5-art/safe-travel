name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ 'frontend/**' ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install Android SDK packages
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci --legacy-peer-deps
        
    - name: Build web app
      run: |
        cd frontend
        npm run build
        
    - name: Sync Capacitor
      run: |
        cd frontend
        npx cap sync android
        
    - name: Build APK
      run: |
        cd frontend/android
        chmod +x gradlew
        ./gradlew clean assembleDebug --no-daemon --stacktrace
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: safe-travel-apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
        
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Safe Travel APK v1.0.${{ github.run_number }}
        files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
        draft: false
        prerelease: false